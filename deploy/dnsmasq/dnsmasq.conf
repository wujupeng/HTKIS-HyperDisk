# HTKIS HyperDisk X - dnsmasq Proxy DHCP + TFTP + PXE
# Alpha V1: Proxy DHCP mode - router handles IP allocation, we only provide PXE boot info
# This avoids DHCP conflict with router at 192.168.2.254
#
# How proxy PXE works:
# - dhcp-range=192.168.2.0,proxy = dnsmasq listens on DHCP port 67
#   but does NOT offer IP addresses to clients
# - It ONLY responds to PXE clients, providing next-server + boot filename
# - Client gets IP from router, PXE boot info from dnsmasq

interface=enp1s0

# Proxy DHCP: listen for PXE clients but don't allocate IPs
# Router 192.168.2.254 handles normal DHCP (IP allocation)
# dnsmasq only provides PXE boot info (next-server, filename)
dhcp-range=192.168.2.0,proxy

# PXE boot: provide next-server and boot filename to PXE clients
dhcp-boot=ipxe.efi,,192.168.2.80

# iPXE chain - when client already has iPXE, redirect to HTTP script
dhcp-match=set:ipxe,175
dhcp-boot=tag:ipxe,http://192.168.2.80/boot/default.ipxe

# TFTP
enable-tftp
tftp-root=/opt/hyperdisk/tftp

# Logging
log-dhcp
log-queries
