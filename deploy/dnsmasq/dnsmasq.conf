# HTKIS HyperDisk X — dnsmasq DHCP+TFTP Configuration
# B3-T01: PXE Boot Service on VLAN 100
# PXE Network: 10.10.100.0/24, Server: 10.10.100.10

# ============================================================
# DHCP Configuration - PXE VLAN 100
# ============================================================
interface=enp1s0

# PXE client DHCP range (VLAN 100)
dhcp-range=10.10.100.100,10.10.100.200,255.255.255.0,12h

# Default gateway
dhcp-option=3,10.10.100.10

# DNS server (local for name resolution)
dhcp-option=6,10.10.100.10

# PXE boot: next-server points to TFTP on this machine
dhcp-boot=ipxe.efi

# PXE service tag (option 60)
dhcp-match=set:pxe,60,PXEClient
dhcp-boot=tag:pxe,ipxe.efi

# iPXE user class match - chain to HTTP script
dhcp-match=set:ipxe,175

# When iPXE requests, give it the HTTP boot script URL
# This allows iPXE to chain-load from HTTP instead of TFTP
dhcp-boot=tag:ipxe,http://10.10.100.10/boot/default.ipxe

# Log DHCP leases
log-dhcp

# ============================================================
# TFTP Configuration
# ============================================================
enable-tftp
tftp-root=/opt/hyperdisk/tftp

# ============================================================
# Logging
# ============================================================
log-queries
log-facility=/var/log/dnsmasq.log

# ============================================================
# Name resolution (optional - enable after VLANs are configured)
# ============================================================
# address=/hyperdisk.local/10.10.100.10
# address=/imageserver.hyperdisk.local/10.10.200.10
# address=/metacenter.hyperdisk.local/10.10.300.10
