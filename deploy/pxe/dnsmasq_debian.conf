# HTKIS HyperDisk X - dnsmasq PXE (Debian 192.168.2.110)
# ONLY respond to known MAC addresses — ignore all unknown clients
interface=enp2s0
bind-interfaces
port=0
no-resolv
no-hosts
no-poll
no-ping

# Known hosts only — ignore unknown clients
dhcp-ignore=tag:!known

# Dell OptiPlex Terminal: F4:EE:08:BC:00:26
dhcp-host=F4:EE:08:BC:00:26,set:hd,192.168.2.132
# New Terminal: 00:BE:43:00:4E:F4
dhcp-host=00:BE:43:00:4E:F4,set:hd,192.168.2.137

# DHCP range for known hosts only (still needed for dnsmasq to function)
dhcp-range=192.168.2.50,192.168.2.59,255.255.255.0,2h

dhcp-authoritative
dhcp-option=3,192.168.2.254
dhcp-option=6,223.6.6.6

# PXE boot for known HyperDisk terminals
dhcp-boot=tag:hd,ipxe.efi
dhcp-match=set:ipxe,175
dhcp-boot=tag:hd,tag:ipxe,http://192.168.2.110/boot/default.ipxe

enable-tftp
tftp-root=/opt/hyperdisk/tftp
tftp-no-blocksize
dhcp-leasefile=/opt/hyperdisk/dnsmasq.leases
log-dhcp
